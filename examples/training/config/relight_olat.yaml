# WandB 设置
wandb_project: lbm-relight

# 模型结构
timestep_sampling: custom_timesteps
unet_input_channels: 9
vae_num_channels: 4
selected_timesteps: [250, 500, 750, 1000]
prob: [0.25, 0.25, 0.25, 0.25]

# Loss 配置
pixel_loss_type: lpips   # 可选 l1 l2 lpips
pixel_loss_weight: 10.0
latent_loss_type: l2     # 可选 l1 l2
latent_loss_weight: 1.0
bridge_noise_sigma: 0.001

# ========= 数据路径（需要你手动替换成自己的路径） =========
composite_root: /mnt/bn/idl-data-cache/cz/data/OLAT_final/synthetic_light_olat_48   # 合成图/输入图
hdr_root: /mnt/bn/pico-idl-avatar2/cz/OLAT/data/OLAT_EnvMaps_HDR_128        # HDR 环境图
alpha_root: /mnt/bn/idl-data-cache/cz/data/OLAT_final/alpha_data          # mask / alpha 通道

# ========= WebDataset 相关在 relight 里不用，可以留空 =========
train_shards: []
validation_shards: []

# 训练参数
batch_size: 4
learning_rate: 5e-5
optimizer: AdamW
num_steps: [1, 4, 10]
log_interval: 500
resume_from_checkpoint: true
max_epochs: 50
save_interval: 10000
save_ckpt_path: /mnt/bn/idl-data-cache/cz/LBM/checkpoints_relight_1105_res_olat_copy
